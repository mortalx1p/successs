<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Success</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background: radial-gradient(circle at top, #eaf2ff, #f7faff);
    overflow:hidden;
}

/* CARD */
.card{
    width:340px;
    background:#fff;
    border-radius:26px;
    box-shadow:0 25px 70px rgba(0,0,0,0.1);
    text-align:center;
    padding:45px 25px;
    position:relative;
    transform:scale(0.9);
    opacity:0;
}

/* ICON */
.icon{
    width:120px;
    height:120px;
    margin:0 auto;
    background:#0054A6;
    border-radius:50%;
    display:flex;
    justify-content:center;
    align-items:center;
    box-shadow:0 15px 35px rgba(0,84,166,0.3);
    opacity:0;
    transform:scale(0.6);
}

svg{
    width:60px;
    height:60px;
}

path{
    fill:none;
    stroke:#fff;
    stroke-width:7;
    stroke-linecap:round;
    stroke-linejoin:round;
    stroke-dasharray:80;
    stroke-dashoffset:80;
}

/* TEXT */
h1{
    margin-top:25px;
    color:#0b2e6b;
    font-size:24px;
    opacity:0;
    transform:translateY(15px);
}

p{
    margin-top:10px;
    font-size:14px;
    color:#4b5b7a;
    opacity:0;
    transform:translateY(15px);
}

/* CONFETTI */
.confetti{
    position:absolute;
    width:8px;
    height:8px;
    top:-10px;
    animation:fall linear forwards;
}

/* ANIMATIONS (SLOW & SMOOTH) */
@keyframes cardIn{
    to{opacity:1;transform:scale(1);}
}

@keyframes pop{
    0%{transform:scale(0.6);opacity:0;}
    70%{transform:scale(1.1);opacity:1;}
    100%{transform:scale(1);opacity:1;}
}

@keyframes draw{
    to{stroke-dashoffset:0;}
}

@keyframes fadeUp{
    to{opacity:1;transform:translateY(0);}
}

@keyframes fall{
    to{
        transform:translateY(110vh) rotate(720deg);
        opacity:0;
    }
}
</style>
</head>

<body>

<div class="card" id="card">

    <div class="icon" id="icon">
        <svg viewBox="0 0 52 52">
            <path id="check" d="M14 27 L22 35 L38 17"></path>
        </svg>
    </div>

    <h1 id="title">Success!</h1>
    <p id="text">Your coupon has been sent to your email</p>

</div>

<script>

// WAIT 5 SECONDS BEFORE STARTING ANYTHING
setTimeout(() => {

    const card = document.getElementById("card");
    const icon = document.getElementById("icon");
    const check = document.getElementById("check");
    const title = document.getElementById("title");
    const text = document.getElementById("text");

    // card reveal
    card.style.transition = "0.8s ease";
    card.style.opacity = "1";
    card.style.transform = "scale(1)";

    // icon pop (slower)
    setTimeout(() => {
        icon.style.transition = "0.9s cubic-bezier(.2,.9,.2,1)";
        icon.style.opacity = "1";
        icon.style.transform = "scale(1)";

        // draw check slowly
        check.style.transition = "1.2s ease";
        check.style.strokeDashoffset = "0";

    }, 600);

    // text fade
    setTimeout(() => {
        title.style.transition = "0.8s ease";
        title.style.opacity = "1";
        title.style.transform = "translateY(0)";
    }, 1400);

    setTimeout(() => {
        text.style.transition = "0.8s ease";
        text.style.opacity = "1";
        text.style.transform = "translateY(0)";
    }, 1800);

    // confetti later (smooth burst)
    setTimeout(launchConfetti, 2200);

}, 5000);


// CONFETTI
function launchConfetti(){
    const colors = ["#0054A6","#00A3FF","#ffffff","#4da3ff","#003b73"];

    for(let i=0;i<80;i++){
        let c = document.createElement("div");
        c.classList.add("confetti");
        document.body.appendChild(c);

        c.style.left = Math.random()*100 + "vw";
        c.style.background = colors[Math.floor(Math.random()*colors.length)];
        c.style.animationDuration = (Math.random()*3 + 3) + "s";

        setTimeout(()=>c.remove(),7000);
    }
}

</script>

</body>
</html>
